<!doctype html>
<html data-theme="light">
 
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker </title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- daisy ui cdn + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto ">
    <div class="logo w-[250px] pt-10 mx-auto">
        <div class="flex justify-center item-center flex-col gap-4">
            <img class="mx-auto" src="./assets/github-logo.png" alt="logo" width="100px">
            <h2 class="mx-auto text-xl font-bold">GitHub Issues Tracker</h2>
            <p class="mx-auto text-sm font-medium text-gray-500">Sign in to manage your issues</p>
        </div>

    </div>

    <div class="form pt-10">

        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label font-bold text-neutral text-[16px]">Username</label>
                    <input id="input-admin" type="text" minlength="5" value="admin"
                        class="input rounded-sm bg-base-200" placeholder="Enter your Username" />
                    <p class="text-blue-800">Default: admin</p>

                    <br>

                    <label class="label font-bold text-neutral text-[16px]">Password</label>
                    <input id="input-password" value="admin123" maxlength="8" type="password"
                        class="input rounded-sm bg-base-200" placeholder="Enter your Password" />
                    <p class="text-blue-800">Default: admin123</p>

                    <button id="btn-sign" class="btn btn-primary rounded-sm mt-4">Sign In</button>
                </fieldset>
                <div class="flex items-center">
                    <hr class="flex-grow border-t border-gray-300">
                    <span class="px-2">or</span>
                    <hr class="flex-grow border-t border-gray-300">
                </div>
                <p class="mx-auto text-gray-600 font-normal text-[14px]">Demo Credentials:</p>
                <p class="mx-auto">Username: admin </p>
                <p class="mx-auto">Password: admin123</p>

            </div>
        </div>
    </div>
    <script src="./index.js"></script>
</body>

</html>
