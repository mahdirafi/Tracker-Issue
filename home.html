<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issues Tracker </title>
    <!-- daisy ui cdn + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <header class=" pt-5  shadow-sm py-4 px-2">
        <div class="w-11/12 mx-auto">
            <nav class="flex flex-col lg:flex-row  justify-between items-center gap-8">
                <div class="left flex items-center gap-2">
                    <img src="./assets/github-logo.png" alt="logo" width="40px">
                    <h4 class="font-semibold text-lg">GitHub Issues Tracker</h4>
                </div>
                <div class="relative flex items-center gap-4 ">
                    <i class="fas fa-search absolute left-2 text-gray-500"></i>
                    <input class="pl-8 pr-2 py-2 border text-[#282a2e99] rounded" type="search" id="inputSearch"
                        placeholder="search issues..">
                    <button id="btnIssue" class="btn btn-primary text-[#f3f3f3e0] font-semibold"> <i
                            class="fas fa-plus"></i>
                        New Issue</button>
                </div>

            </nav>
        </div>
    </header>
    <!-- button 3 -->
    <section class="w-10/12 mx-auto flex items-center justify-center lg:justify-start mt-16 mb-10 gap-4">
        <button id="btnAll" class="btn btn-primary text-white bg-primary">All</button>
        <button id="btnOpen" class="btn bg-white text-gray-500">Open</button>
        <button id="btnClosed" class="btn bg-white text-gray-500">Closed</button>

    </section>

    <!-- issues -->

    <section class="flex flex-col lg:flex-row justify-between items-center w-10/12 mx-auto shadow-md p-4 gap-6">
        <!-- Left Side -->
        <div class="flex items-center gap-3">
            <img src="./assets/Aperture.png" alt="" class="bg-gray-300 p-2 rounded-full">
            <div>
                <h2 id="issueCount" class="text-xl font-semibold">50 Issue</h2>
                <p class="text-[#64748B] text-lg">Track and manage your project issues</p>
            </div>
        </div>

        <!-- Right Side -->
        <div class="flex items-center gap-4 mt-4 lg:mt-0">
            <div class="flex items-center gap-1">
                <i class="fa-solid fa-circle text-green-600"></i>
                <p class="text-[#64748B] font-semibold">Open</p>
            </div>
            <div class="flex items-center gap-1">
                <i class="fa-solid fa-circle text-purple-600"></i>
                <p class="text-[#64748B] font-semibold">Closed</p>
            </div>
        </div>

    </section>


    <!-- display All issue  -->
    <section class="w-10/12 mx-auto my-8">
        <div id="issuesContainer" class="grid grid-cols-1 lg:grid-cols-3 gap-4 bg-gray-100 p-4">

            <!-- loading Spinner -->
            <div id="loadingSpringer"
                class="fixed inset-0 flex justify-center items-center bg-white bg-opacity-70 hidden">
                <span class="loading loading-bars loading-xl"></span>
            </div>

    <!-- Open the modal using ID.showModal() method -->
    <dialog id="issueModal" class="modal modal-bottom sm:modal-middle flex justify-center items-center">
        <div class="modal-box p-8 space-y-4">
            <h3 id="modalTitle" class="text-lg font-bold"></h3>
            <div class="flex items-center gap-5">
                <p id="modalStatus" class="rounded-full shadow-md px-2 py-1"></p>
                <li id="modalAuthor"></li>
                <li id="modalDate"></li>
            </div>
            <div class="flex gap-3" id="modalLabels"></div>
            <p id="modalDescription" class="line-clamp-2"></p>
            <div class="flex justify-evenly items-center gap-8">
                <div class="flex flex-col gap-3">
                    <h2>Assignee:</h2>
                    <h2 id="modalAssignee"></h2>
                </div>
                <div class="flex flex-col gap-3">
                    <h2>Priority:</h2>
                    <div id="modalPriority" class="rounded-full shadow-md px-2 py-1"></div>
                </div>
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="./home.js"></script>
</body>

</html>
